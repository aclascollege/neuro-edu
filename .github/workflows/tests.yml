name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx ruff bandit pip-audit
    - name: Lint with ruff
      run: |
        ruff check neuro_edu/ main.py cli.py
    - name: Security Audit (Bandit)
      run: |
        bandit -r neuro_edu/ main.py cli.py -ll
    - name: Dependency Audit (pip-audit)
      run: |
        pip-audit -r requirements.txt --local || true
    - name: Test with pytest (including API)
      run: |
        pytest tests/ -v
    - name: Run Performance Benchmark
      run: |
        python scripts/benchmark.py
